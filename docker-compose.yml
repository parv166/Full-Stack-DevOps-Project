version: '3.8'

services:
  db:
    image: postgres:15
    container_name: postgres-taskflow
    environment:
      POSTGRES_DB: taskflowdb
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: taskflow-app
    ports:
      - "8080:8080"
    depends_on:
      - db
